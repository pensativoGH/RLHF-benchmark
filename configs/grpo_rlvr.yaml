# GRPO + RLVR Configuration
# Based on rasbt's approach for training on MATH dataset

# Model
model:
  name: "Qwen/Qwen3-0.6B"
  # Full fine-tuning (no LoRA to match rasbt exactly)
  use_lora: false
  torch_dtype: "float32"

# Training data
data:
  train_url: "https://raw.githubusercontent.com/rasbt/math_full_minus_math500/refs/heads/main/math_full_minus_math500.json"
  train_cache: "data/math_train.json"
  shuffle: true
  seed: 42

# Generation settings
generation:
  num_rollouts: 4           # Match rasbt's demo (use 8 for better results)
  max_new_tokens: 512       # Required for full reasoning
  temperature: 0.8
  top_p: 0.9

# Training settings
training:
  num_steps: 50             # Match rasbt's demo
  learning_rate: 1.0e-5
  gradient_clip: 1.0
  optimizer: "adamw"
  # No KL penalty (Chapter 6 baseline)
  use_kl_penalty: false
  kl_coeff: 0.02            # Only used if use_kl_penalty is true

# Checkpointing
checkpoint:
  save_every: 5
  output_dir: "checkpoints/grpo_rlvr"

# Evaluation
eval:
  eval_every: 10            # Evaluate on MATH-500 subset during training
  eval_problems: 50         # Number of problems for quick eval
  final_eval_problems: 500  # Full eval at end

# Logging
logging:
  log_every: 1
  wandb_project: null       # Set to enable wandb logging
  wandb_run_name: null

# Hardware
hardware:
  # Device auto-detection: mps, cuda, or cpu
  device: "auto"
  # Memory optimizations (reduce if OOM)
  # Reduce num_rollouts to 4 or 2 if memory is limited
  # Reduce max_new_tokens to 256 if needed
