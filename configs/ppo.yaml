seed: 42

model:
  name: Qwen/Qwen2-0.5B
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules:
    - q_proj
    - v_proj
  lora_dropout: 0.05

ppo:
  learning_rate: 1.0e-5
  kl_coef: 0.05  # KL penalty coefficient
  clip_range: 0.2  # PPO clip range
  clip_range_vf: 0.2  # Value function clip range
  vf_coef: 0.1  # Value function loss coefficient
  ppo_epochs: 4  # PPO epochs per batch
  mini_batch_size: 4
  target_kl: 6.0  # Target KL divergence for early stopping
  init_kl_coef: 0.2  # Initial KL coefficient for adaptive

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 256
  device: mps
  gradient_checkpointing: true
  epochs: 1  # Number of passes through the dataset

generation:
  max_new_tokens: 64
  temperature: 0.7
  top_p: 0.9
  do_sample: true

data:
  dataset: Anthropic/hh-rlhf
  num_samples: 2000
  train_split: 0.9
  val_split: 0.1
  min_length: 10
  max_length: 256

logging:
  log_every_n_steps: 10
  eval_every_n_steps: 100
  save_every_n_steps: 200

output:
  checkpoint_dir: checkpoints/ppo_model
  results_dir: results/m3_ppo
  reward_model_path: checkpoints/reward_model/best
